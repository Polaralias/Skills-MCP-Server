version: '3.9'

services:
  skills-mcp:
    image: skills-mcp-server:latest
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      SKILLS_DIRECTORIES: /app/skills
    volumes:
      - ./skills:/app/skills:ro
    ports:
      - "3000:3000"
    command: ["node", "./dist/server/index.js"]
